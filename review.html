<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartFill AI — Review</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f6fa;--surface:#fff;--row-alt:#fcfcfd;--hover:#eef1f8;
      --border:#e4e7ef;--accent:#2563eb;--accent-dim:#1d4ed8;--accent-light:#eff4ff;
      --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
      --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;
      --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
      --text:#111827;--text-2:#374151;--text-3:#6b7280;--text-4:#9ca3af;
      --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
      --shadow:0 1px 4px rgba(0,0,0,0.07);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      font-size:14px;color:var(--text);background:var(--bg);
    }
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}
    *{scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent;}

    body{min-height:100vh;display:flex;flex-direction:column;}

    /* ── Row 1: Brand bar ─────────────────── */
    .header-brand{
      display:flex;align-items:center;
      padding:0 20px;height:46px;
      background:var(--surface);
      border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:101;
      box-shadow:none;
    }
    .brand{display:flex;align-items:center;gap:8px;}
    .brand-logo{width:26px;height:26px;border-radius:6px;background:var(--accent);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:800;font-size:13px;}
    .brand-name{font-size:15px;font-weight:800;letter-spacing:-0.3px;}
    .brand-name em{font-style:normal;color:var(--accent);}

    /* ── Row 2: Action bar (only spans main panel, not sidebar) ── */
    /* ── Sticky Review Action Bar ───────────────────────────── */
.header-actions{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;

    padding:12px 16px;

    background:var(--surface);

    border:1px solid var(--border);
    border-radius:10px;

    box-shadow:var(--shadow);

    margin-bottom:16px;

    /* Sticky */
    position:sticky;
    top:0;

    z-index:100;

    transition:box-shadow .2s ease;
}

.header-actions::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:-12px;
    height:12px;
    background:linear-gradient(
        to bottom,
        rgba(244,246,250,1),
        rgba(244,246,250,0)
    );
    pointer-events:none;
}
    .action-left{display:flex;flex-direction:column;justify-content:center;}
    .action-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px;line-height:1.2;}
    .action-sub{font-size:11px;color:var(--text-3);margin-top:2px;}

    .action-center{flex:1;text-align:center;}
    .hdr-ok{font-size:13px;color:var(--green);font-weight:600;}
    .hdr-ok small{display:block;font-size:11px;color:var(--text-3);font-weight:400;margin-top:1px;}
    .hdr-warn{font-size:13px;color:var(--amber);font-weight:600;}
    .hdr-msg{display:none;}

    .action-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .save-msg{font-size:12px;color:var(--green);font-weight:600;white-space:nowrap;}

    /* Light green primary button */
    .btn-use{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 22px;border-radius:8px;font-size:13px;font-weight:700;
      cursor:pointer;border:1.5px solid #a5d6a7;font-family:inherit;
      background:#009900;color:#000000;transition:all 0.15s;white-space:nowrap;
    }
    .btn-use:hover{background:#c8e6c9;border-color:#81c784;box-shadow:0 2px 8px rgba(46,125,50,0.2);}
    .btn-use:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-use:active{transform:scale(0.98);}

    .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;
      border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;
      border:none;transition:all 0.15s;white-space:nowrap;font-family:inherit;}
    .btn-ghost{background:var(--surface);border:1.5px solid var(--border);color:var(--text-2);}
    .btn-ghost:hover{background:var(--bg);color:var(--text);}
    .btn-green{background:var(--green);color:#fff;}
    .btn-green:hover{filter:brightness(1.06);}
    .btn-green:disabled{opacity:0.5;cursor:not-allowed;}

        /* ── Layout ──────────────────────────── */
    .layout{flex:1;display:flex;height:calc(100vh - 46px);overflow:hidden;}
    .main{flex:1;overflow-y:auto;padding:16px 20px 32px;position:relative;}

    /* #4 compact intro */
    .intro{display:flex;align-items:baseline;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .intro h1{font-size:16px;font-weight:800;letter-spacing:-0.3px;}
    .intro .sub{font-size:12px;color:var(--text-3);}

    /* ── Section ─────────────────────────── */
    .sec{background:var(--surface);border:1px solid var(--border);
      border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;}
    .sec-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 16px;cursor:pointer;user-select:none;
      border-bottom:1px solid var(--border);transition:background 0.1s;
    }
    .sec-head:hover{background:var(--bg);}
    .sec-left{display:flex;align-items:center;gap:8px;}
    .sec-icon{font-size:15px;}
    .sec-name{font-size:13px;font-weight:700;}
    /* #15 better collapse: count in parens */
    .sec-count{font-size:12px;color:var(--text-4);font-weight:400;}
    .caret{font-size:10px;color:var(--text-4);transition:transform 0.2s;margin-left:6px;}
    .caret.open{transform:rotate(180deg);}
    .sec-body.collapsed{display:none;}

    /* ── Table ───────────────────────────── */
    table{width:100%;border-collapse:collapse;table-layout:fixed;}
    /* #3: Field 20%, Value 62%, Source 18% — no status column */
    col.c-f{width:20%;}
    col.c-v{width:62%;}
    col.c-s{width:18%;}

    thead tr{background:var(--bg);}
    thead th{padding:6px 12px;text-align:left;font-size:10px;font-weight:700;
      letter-spacing:0.5px;text-transform:uppercase;color:var(--text-4);
      border-bottom:1px solid var(--border);}

    /* #4 reduce row height to ~40px, #14 alternate rows */
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:nth-child(even){background:var(--row-alt);}
    /* #13 hover effect — light blue */
    tbody tr:hover{background:var(--hover)!important;}
    tbody tr.r-warn{background:var(--amber-bg)!important;}
    tbody tr.r-warn:hover{background:#fef3c7!important;}
    tbody tr.r-edit{background:var(--accent-light)!important;}
    tbody tr.r-edit:hover{background:#e4edff!important;}

    .td-f{padding:0 12px;height:40px;font-size:13px;font-weight:500;
      color:var(--text-2);vertical-align:middle;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* #3 value is primary — full width input, no box until focus */
    .td-v{padding:0 6px 0 4px;height:40px;vertical-align:middle;}
    .val{
      width:100%;height:32px;border:1.5px solid transparent;outline:none;
      background:transparent;font-size:14px;color:var(--text);
      font-family:inherit;font-weight:400;padding:0 8px;border-radius:6px;
      transition:border-color 0.12s,background 0.12s;cursor:text;
    }
    .val:hover{background:rgba(37,99,235,0.04);}
    .val:focus{background:var(--surface);border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
    .val::placeholder{color:var(--text-4);font-size:12px;font-style:italic;}

    /* #1 No status column. Source pill carries the warning icon */
    .td-src{padding:0 12px;height:40px;vertical-align:middle;}
    .src-wrap{display:flex;align-items:center;gap:4px;}

    /* #2 smaller pills, #11 colored */
    .pill{display:inline-flex;align-items:center;gap:3px;
      padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;
      white-space:nowrap;letter-spacing:0.1px;}
    .pill-aadhaar {background:#dbeafe;color:#1e40af;}
    .pill-pan     {background:#fce7f3;color:#9d174d;}
    .pill-passport{background:#ede9fe;color:#5b21b6;}
    .pill-driving {background:#d1fae5;color:#065f46;}
    .pill-voter   {background:#fef9c3;color:#854d0e;}
    .pill-ssc     {background:#fef3c7;color:#92400e;}
    .pill-inter   {background:#ffedd5;color:#9a3412;}
    .pill-degree  {background:#dcfce7;color:#14532d;}
    .pill-bank    {background:#e0f2fe;color:#075985;}
    .pill-manual  {background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;}
    .pill-auto    {background:#f3f4f6;color:#374151;}

    /* #9 warning only on source — no status column */
    .warn-icon{font-size:12px;color:var(--amber);}
    .edit-icon{font-size:11px;color:var(--accent);}

    /* ── Fixed sidebar ──────────────────── */
    .sidebar{
      width:190px;flex-shrink:0;border-left:1px solid var(--border);
      background:var(--surface);padding:14px 12px;
      display:flex;flex-direction:column;gap:14px;
      position:fixed;right:0;top:46px;
      height:calc(100vh - 46px);overflow-y:auto;
    }
    /* Give main panel right margin so content doesn't hide behind fixed sidebar */
    .main{margin-right:190px;}
    .sb-title{font-size:10px;font-weight:700;letter-spacing:0.8px;
      text-transform:uppercase;color:var(--text-4);margin-bottom:6px;}

    /* #6 clean doc chips */
    .doc-chip{display:flex;align-items:center;gap:7px;padding:7px 9px;
      background:var(--green-bg);border:1px solid var(--green-border);
      border-radius:7px;margin-bottom:4px;}
    .doc-chip.fail{background:var(--amber-bg);border-color:var(--amber-border);}
    .doc-chip-icon{font-size:15px;}
    .doc-chip-name{font-size:12px;font-weight:600;color:var(--text);flex:1;}
    .doc-chip-tick{font-size:12px;color:var(--green);}
    .doc-chip.fail .doc-chip-tick{color:var(--amber);}

    /* #12 bigger primary action */
    .sb-actions{margin-top:auto;display:flex;flex-direction:column;gap:6px;}
    .sb-btn{width:100%;padding:9px;border-radius:8px;font-size:13px;
      font-weight:600;cursor:pointer;border:none;
      transition:all 0.15s;font-family:inherit;text-align:center;}

    .sb-copy{background:var(--surface);border:1.5px solid var(--border);
      color:var(--text-2);font-size:12px;}
    .sb-copy:hover{background:var(--bg);}
    .sb-new{background:var(--red-bg);border:1.5px solid var(--red-border);
      color:var(--red);font-size:12px;}
    .sb-new:hover{background:#fee2e2;}

    /* #12 privacy */
    .privacy{font-size:10px;color:var(--text-4);text-align:center;
      line-height:1.5;padding:8px 2px 0;}

    /* #10 empty field */
    .empty-row td{height:38px!important;}
    .not-avail{font-size:12px;color:var(--text-4);font-style:italic;}
  </style>
</head>
<body>

<!-- Row 1: Brand bar -->
<div class="header-brand">
  <div class="brand">
    <div class="brand-logo">S</div>
    <span class="brand-name">SmartFill <em>AI</em></span>
  </div>
</div>

</div>

<div class="layout">
  <div class="main" id="mainPanel">
    <div style="text-align:center;padding:60px;color:var(--text-3)">Loading…</div>
  </div>

  <!-- Sticky sidebar -->
  <div class="sidebar">

    <div>
      <button class="sb-btn sb-upload" onclick="goBack()">↑ Upload More</button>
    </div>
    <div>
      <div class="sb-title">Documents Used <span id="docsCount" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
      <div id="docsList"></div>
    </div>
    <div class="sb-actions">
      <button class="sb-btn sb-new" onclick="newSession()">↺ New Customer</button>
      <!-- #12 privacy -->
      <div class="privacy">🔒 Customer documents are permanently deleted when this session ends.</div>
      <div style="font-size:10px;color:var(--text-4);text-align:center;padding-top:6px;letter-spacing:0.3px;">
        Powered by SmartFill AI
      </div>
    </div>
  </div>
</div>

<script>
"use strict";

const SECTIONS=[
  {id:"personal",title:"Personal Details",    icon:"👤",fields:[
    {key:"name",         label:"Full Name"},
    {key:"father_name",  label:"Father / Guardian"},
    {key:"mother_name",  label:"Mother Name"},
    {key:"gender",       label:"Gender"},
    {key:"dob",          label:"Date of Birth"},
    {key:"nationality",  label:"Nationality"},
  ]},
  {id:"contact", title:"Contact & Address",   icon:"📍",fields:[
    {key:"mobile",           label:"Mobile Number"},
    {key:"email",            label:"Email Address"},
    {key:"address_line1",    label:"Address Line 1"},
    {key:"address_line2",    label:"Address Line 2"},
    {key:"address_city",     label:"City / Town"},
    {key:"address_district", label:"District"},
    {key:"address_state",    label:"State"},
    {key:"address_pincode",  label:"PIN Code"},
    {key:"address",          label:"Full Address"},
  ]},
  {id:"ids",     title:"Government IDs",      icon:"🪪",fields:[
    {key:"aadhaar_number",  label:"Aadhaar Number"},
    {key:"pan_number",      label:"PAN Number"},
    {key:"passport_number", label:"Passport Number"},
    {key:"voter_id",        label:"Voter ID"},
    {key:"dl_number",       label:"Driving Licence No."},
  ]},
  {id:"ssc",    title:"Education — SSC",      icon:"📜",fields:[
    {key:"ssc_name",       label:"Student Name"},
    {key:"ssc_roll",       label:"Hall Ticket No."},
    {key:"ssc_school",     label:"School"},
    {key:"ssc_board",      label:"Board"},
    {key:"ssc_year",       label:"Year"},
    {key:"ssc_percentage", label:"Percentage"},
  ]},
  {id:"inter",  title:"Education — Inter",    icon:"📋",fields:[
    {key:"inter_name",       label:"Student Name"},
    {key:"inter_roll",       label:"Hall Ticket No."},
    {key:"inter_college",    label:"College"},
    {key:"inter_board",      label:"Board"},
    {key:"inter_year",       label:"Year"},
    {key:"inter_percentage", label:"Percentage"},
    {key:"inter_group",      label:"Group / Stream"},
  ]},
  {id:"degree",   title:"Education — Degree",   icon:"🎓",fields:[
    {key:"degree_name",       label:"Degree"},
    {key:"degree_branch",     label:"Specialization / Branch"},
    {key:"degree_university", label:"University"},
    {key:"degree_college",    label:"College"},
    {key:"degree_roll",       label:"Enrollment / Roll No."},
    {key:"degree_year",       label:"Year of Passing"},
    {key:"degree_percentage", label:"Percentage / CGPA"},
    {key:"degree_grade",      label:"Class / Grade"},
  ]},
  {id:"bank",   title:"Banking",              icon:"🏦",fields:[
    {key:"account_number", label:"Account Number"},
    {key:"ifsc",           label:"IFSC Code"},
    {key:"bank_name",      label:"Bank Name"},
    {key:"branch",         label:"Branch"},
  ]},
];

/* #7 — never show "auto", map doc types to clean labels */
const SRC_INFO={
  aadhaar:           {cls:"pill-aadhaar", label:"Aadhaar"},
  pan:               {cls:"pill-pan",     label:"PAN"},
  passport:          {cls:"pill-passport",label:"Passport"},
  driving_license:   {cls:"pill-driving", label:"Driving Licence"},
  voter_id:          {cls:"pill-voter",   label:"Voter ID"},
  certificate_ssc:   {cls:"pill-ssc",     label:"SSC"},
  certificate_inter: {cls:"pill-inter",   label:"Inter"},
  certificate_degree:{cls:"pill-degree",  label:"Degree"},
  bank_passbook:     {cls:"pill-bank",    label:"Bank"},
  manual:            {cls:"pill-manual",  label:"Manual Entry"},
};
const DOC_ICONS={aadhaar:"🪪",pan:"💳",passport:"📘",driving_license:"🚗",
  voter_id:"🗳️",certificate_ssc:"📜",certificate_inter:"📋",
  certificate_degree:"🎓",bank_passbook:"🏦"};
const DOC_NAMES={aadhaar:"Aadhaar",pan:"PAN",passport:"Passport",
  driving_license:"Driving Licence",voter_id:"Voter ID",
  certificate_ssc:"SSC",certificate_inter:"Inter Cert",
  certificate_degree:"Degree",bank_passbook:"Bank Passbook"};

let profile=null,sessionData=null;
const edits={};
const collapsed={};

function rawF(k){return profile?profile[k]:null;}
function getVal(k){
  if(edits[k]!==undefined)return edits[k];
  var r=rawF(k);if(!r)return null;
  if(typeof r==="object")return r.value||null;
  if(typeof r==="string")return r.trim()||null;
  return null;
}
function getConf(k){var r=rawF(k);if(!r)return 0;if(typeof r==="object")return Number(r.confidence)||0;return 100;}
function getSrc(k){var r=rawF(k);if(!r||typeof r!=="object")return"";return r.source_doc||"";}
function isWarn(k){
  if(edits[k]!==undefined)return false;
  var v=getVal(k);if(!v)return false;
  var rl=(profile&&profile.fields_needing_review)||[];
  return getConf(k)<70||rl.indexOf(k)>=0;
}
function getFinal(){
  var r={};
  SECTIONS.forEach(function(s){s.fields.forEach(function(f){var v=getVal(f.key);if(v)r[f.key]=v;});});
  return r;
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ── Auto-formatting (display only — raw value stored internally) ─────────────

// DOB/dates: YYYY-MM-DD → DD/MM/YYYY (also fixes AI day/month swap)
function fmtDate(v){
  if(!v)return v;
  var m=v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m)return v;
  var y=m[1],mo=m[2],d=m[3];
  // Fix common AI swap: if "month" > 12, it's actually the day
  if(parseInt(mo,10)>12){var t=mo;mo=d;d=t;}
  return d+"/"+mo+"/"+y;
}
function parseFmtDate(s){
  var m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  return m?m[3]+"-"+m[2]+"-"+m[1]:s;
}

// Aadhaar: 201412937596 → 2014 1293 7596
function fmtAadhaar(v){
  if(!v)return v;
  var d=v.replace(/\D/g,"");
  if(d.length!==12)return v;
  return d.slice(0,4)+" "+d.slice(4,8)+" "+d.slice(8);
}
function parseFmtAadhaar(s){return s.replace(/\s/g,"");}

// PAN: always uppercase, trim spaces
function fmtPAN(v){return v?v.toUpperCase().trim():v;}

// Passport number: uppercase
function fmtPassport(v){return v?v.toUpperCase().trim():v;}

// PIN code: digits only
function fmtPIN(v){return v?v.replace(/\D/g,""):v;}

// Phone: digits only, strip country code
function fmtPhone(v){
  if(!v)return v;
  var d=v.replace(/\D/g,"");
  if(d.length===12&&d.startsWith("91"))d=d.slice(2);
  return d;
}
function parseFmtPhone(s){return s.replace(/\D/g,"");}

// Title Case for names, state, city, district
function fmtTitleCase(v){
  if(!v)return v;
  return v.toLowerCase().replace(/(?:^|\s)\w/g,function(c){return c.toUpperCase();});
}

// DL number: uppercase
function fmtDL(v){return v?v.toUpperCase().replace(/\s+/g,""):v;}

// Email: lowercase
function fmtEmail(v){return v?v.toLowerCase().trim():v;}

// Master formatter: apply correct format per field key
function formatDisplay(key, val){
  if(!val)return val;
  switch(key){
    case "dob": case "doi": case "doe":
      return fmtDate(val);
    case "aadhaar_number":
      return fmtAadhaar(val);
    case "pan_number":
      return fmtPAN(val);
    case "passport_number":
      return fmtPassport(val);
    case "dl_number":
      return fmtDL(val);
    case "address_pincode":
      return fmtPIN(val);
    case "mobile":
      return fmtPhone(val);
    case "email":
      return fmtEmail(val);
    case "address_state": case "address_city": case "address_district":
    case "bank_name": case "branch": case "nationality":
      return fmtTitleCase(val);
    default:
      return val;
  }
}

// Master parser: convert display value back to internal format for saving
function parseDisplay(key, display){
  if(!display)return display;
  switch(key){
    case "dob": case "doi": case "doe":
      return parseFmtDate(display);
    case "aadhaar_number":
      return parseFmtAadhaar(display);
    case "mobile":
      return parseFmtPhone(display);
    default:
      return display;
  }
}

const DATE_KEYS=["dob","doi","doe"];

document.addEventListener("DOMContentLoaded",function(){
  try{
    var raw=sessionStorage.getItem("smartfill_profile");
    if(!raw){showEmpty();return;}
    sessionData=JSON.parse(raw);profile=sessionData.profile;
    if(!profile)throw new Error("No profile data");
    render();renderDocs();updateHdr();
  }catch(e){showErr(e.message);}
});

function showEmpty(){
  document.getElementById("mainPanel").innerHTML=
    '<div style="text-align:center;padding:80px;color:var(--text-3)">'+
    '<div style="font-size:44px;margin-bottom:12px">🗂️</div>'+
    '<div style="font-size:16px;font-weight:700;margin-bottom:8px">No data found</div>'+
    '<a href="/app" style="color:var(--accent);font-weight:600">← Upload documents</a></div>';
}
function showErr(m){
  document.getElementById("mainPanel").innerHTML=
    '<div style="text-align:center;padding:80px;color:var(--red)">'+
    '<div style="font-size:40px;margin-bottom:10px">⚠️</div>'+
    '<div style="font-weight:700;margin-bottom:6px">Error</div>'+
    '<div style="color:var(--text-3);margin-bottom:14px">'+esc(m)+'</div>'+
    '<a href="/app" style="color:var(--accent)">← Go back</a></div>';
}

/* #11 header status */
function updateHdr(){
  var n=0;
  var totalF2=0;
  SECTIONS.forEach(function(s){s.fields.forEach(function(f){if(getVal(f.key)){totalF2++;if(isWarn(f.key))n++;}});});
  /* Update sticky sub-header */
  var subEl=document.getElementById("staticSub");
  if(subEl)subEl.textContent="· "+(n>0?n+" field"+(n!==1?"s":"")+" need review":totalF2+" Fields · Ready to Use");
  /* Also update render sub if present */
  var ok=document.getElementById("hdrOk");
  if(ok){ok.innerHTML=n>0
    ?'<span class="hdr-warn">⚠ '+n+' field'+(n!==1?'s':'')+' need review</span>'
    :'✓ Ready to Autofill';}
  var subEl2=document.getElementById("staticSub");
  if(subEl2)subEl2.textContent="· "+(n>0?n+" field"+(n!==1?"s":"")+" need review":totalF2+" Fields · Ready to Use");
}

function render(){
  var totalF=0,warnC=0,html="";
  SECTIONS.forEach(function(sec){
    var rows=sec.fields.filter(function(f){return!!getVal(f.key);});
    /* #10 also show fields from docs uploaded but not found */
    totalF+=rows.length;
    rows.forEach(function(f){if(isWarn(f.key))warnC++;});
    if(!rows.length)return;
    var isCol=collapsed[sec.id];
    html+=
      '<div class="sec"><div class="sec-head" onclick="toggleSec(\''+sec.id+'\')">'+
        '<div class="sec-left">'+
          '<span class="sec-icon">'+sec.icon+'</span>'+
          '<span class="sec-name">'+esc(sec.title)+'</span>'+
          /* #15 count in parens */
          '<span class="sec-count"> ('+rows.length+')</span>'+
        '</div>'+
        '<span class="caret'+(isCol?'':' open')+'" id="caret-'+sec.id+'">▲</span>'+
      '</div>'+
      '<div class="sec-body'+(isCol?' collapsed':'')+'" id="body-'+sec.id+'">'+
        '<table><colgroup>'+
          '<col class="c-f"><col class="c-v"><col class="c-s">'+
        '</colgroup><thead><tr>'+
          '<th>Field</th><th>Value</th><th>Source</th>'+
        '</tr></thead><tbody>'+
        rows.map(function(f,i){return makeRow(f.key,f.label,i);}).join("")+
        '</tbody></table>'+
      '</div></div>';
  });
  if(!totalF){
    html='<div style="text-align:center;padding:70px;color:var(--text-3)">'+
      '<div style="font-size:42px;margin-bottom:12px">📭</div>'+
      '<div>No fields extracted.</div>'+
      '<div style="margin-top:8px"><a href="/app" style="color:var(--accent)">← Try again</a></div></div>';
  }
  var sub=warnC>0?warnC+" field"+(warnC!==1?"s":"")+" need review":totalF+" Fields · Ready to Use";
  var subEl=document.getElementById("staticSub");
  if(subEl)subEl.textContent="· "+sub;
  var actionBar=
    '<div class="header-actions">'+
      '<div class="action-left">'+
        '<div class="action-title">Review Extracted Data</div>'+
        '<div class="action-sub" id="staticSub">· '+esc(sub)+'</div>'+
      '</div>'+
      '<div class="action-center">'+
        '<div id="hdrOk" class="hdr-ok">'+
          (warnC>0
            ? '<span class="hdr-warn">⚠ '+warnC+' field'+(warnC!==1?'s':'')+' need review</span>'
            : '✓ Ready to Autofill')+
        '</div>'+
      '</div>'+
      '<div class="action-right">'+
        '<span class="save-msg" id="saveMsg"></span>'+
        '<button class="btn-use" id="useBtn" onclick="confirmAndUse()">✓ Use This Data</button>'+
      '</div>'+
    '</div>'+
    '<div style="padding:16px 20px 32px">';
  document.getElementById("mainPanel").innerHTML=actionBar+html+'</div>';
}

function toggleSec(id){
  collapsed[id]=!collapsed[id];
  var b=document.getElementById("body-"+id),c=document.getElementById("caret-"+id);
  if(collapsed[id]){b.classList.add("collapsed");c.classList.remove("open");}
  else{b.classList.remove("collapsed");c.classList.add("open");}
}

function makeRow(key,label,idx){
  var val=getVal(key),src=getSrc(key);
  var warn=isWarn(key),edited=edits[key]!==undefined;
  var rowCls=edited?"r-edit":warn?"r-warn":"";

  // Apply auto-formatting for display
  var displayVal=val?formatDisplay(key,val):(val||"");

  /* #1 No status column — warn icon goes on source pill only */
  /* #2 smaller pill, #7 clean label */
  /* Never show "auto" — try to infer from field type */
  var srcDisplay=src;
  if(src==="auto"||!src){
    /* Guess from the field itself which document it came from */
    if(key==="pan_number"||key==="father_name"&&!getVal("aadhaar_number"))srcDisplay="pan";
    else if(key==="aadhaar_number"||key==="address_line1")srcDisplay="aadhaar";
    else srcDisplay="";
  }
  var si=SRC_INFO[srcDisplay]||{cls:"pill-auto",label:srcDisplay||""};
  var pillHtml=srcDisplay&&srcDisplay!=="auto"
    ?'<span class="pill '+si.cls+'">'+esc(si.label)+'</span>'
    :'';
  /* #9 only show warning when needed, #1 no tick on every row */
  var flagHtml="";
  if(edited)    flagHtml=' <span class="edit-icon" title="Edited">✎</span>';
  else if(warn) flagHtml=' <span class="warn-icon" title="Please verify">⚠</span>';

  return'<tr class="'+rowCls+'" id="tr-'+key+'">'+
    '<td class="td-f">'+esc(label)+'</td>'+
    '<td class="td-v"><input class="val" id="inp-'+key+'" value="'+esc(displayVal)+'" '+
      'placeholder="Not available" oninput="onEdit(\''+key+'\')" /></td>'+
    '<td class="td-src" id="src-'+key+'"><div class="src-wrap">'+pillHtml+flagHtml+'</div></td>'+
    '</tr>';
}

function onEdit(key){
  var inp=document.getElementById("inp-"+key);
  var rawV=rawF(key);
  var origRaw=rawV?(typeof rawV==="object"?rawV.value||"":rawV.trim()):"";
  var origDisplay=origRaw?formatDisplay(key,origRaw):origRaw;
  var cur=inp.value;
  if(cur!==origDisplay)edits[key]=parseDisplay(key,cur);
  else delete edits[key];

  var tr=document.getElementById("tr-"+key);
  var srcTd=document.getElementById("src-"+key);
  if(!tr||!srcTd)return;
  var ed=edits[key]!==undefined,wn=isWarn(key);
  tr.className=ed?"r-edit":wn?"r-warn":"";

  /* update source cell flag only */
  var src=getSrc(key);
  var si=SRC_INFO[src]||{cls:"pill-auto",label:src||"—"};
  var pillHtml=src?'<span class="pill '+si.cls+'">'+esc(si.label)+'</span>':"";
  var flagHtml="";
  if(ed)       flagHtml=' <span class="edit-icon">✎</span>';
  else if(wn)  flagHtml=' <span class="warn-icon">⚠</span>';
  srcTd.innerHTML='<div class="src-wrap">'+pillHtml+flagHtml+'</div>';
  updateHdr();
}

/* #6 clean sidebar docs, #8 remove "2 documents" count */
function renderDocs(){
  var docs=(sessionData&&sessionData.documents)||[];
  var el=document.getElementById("docsList");
  var countEl=document.getElementById("docsCount");
  if(!docs.length){el.innerHTML='<div style="font-size:12px;color:var(--text-3)">—</div>';return;}
  var shown=docs.filter(function(d){return d.status==="success"||d.status==="partial";});
  if(countEl)countEl.textContent="("+shown.length+")";
  el.innerHTML=shown.map(function(d){
    /* #7 never show "auto" */
    var type=d.type==="auto"&&d.filename?guessTypeFromFilename(d.filename):d.type;
    var icon=DOC_ICONS[type]||"📄";
    var name=DOC_NAMES[type]||formatDocType(type);
    return'<div class="doc-chip">'+
      '<span class="doc-chip-icon">'+icon+'</span>'+
      '<span class="doc-chip-name">'+esc(name)+'</span>'+
      '<span class="doc-chip-tick">✓</span>'+
      '</div>';
  }).join("");
}

function guessTypeFromFilename(fn){
  var n=(fn||"").toLowerCase();
  if(n.includes("aadh")||n.includes("uid"))return"aadhaar";
  if(n.includes("pan"))return"pan";
  if(n.includes("passport"))return"passport";
  if(n.includes("driving")||n.includes("dl"))return"driving_license";
  if(n.includes("ssc")||n.includes("10th"))return"certificate_ssc";
  if(n.includes("inter")||n.includes("12th"))return"certificate_inter";
  if(n.includes("degree")||n.includes("btech"))return"certificate_degree";
  if(n.includes("bank")||n.includes("passbook"))return"bank_passbook";
  return"generic";
}

function formatDocType(t){
  return(t||"Document").replace(/_/g," ").replace(/\b\w/g,function(c){return c.toUpperCase();});
}

async function confirmAndUse(){
  var final=getFinal();
  if(!Object.keys(final).length){alert("No fields to save.");return;}
  var btn=document.getElementById("useBtn"),msg=document.getElementById("saveMsg");
  btn.disabled=true;btn.textContent="Saving…";
  try{
    var res=await fetch("https://web-production-a52e0.up.railway.app/api/v1/save-session",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({profile:final})
    });
    var d=await res.json();
    if(!d.ok)throw new Error(d.error||"Failed");
    btn.textContent="✓ Saved";btn.style.background="#15803d";
    msg.textContent=d.fields+" fields ready";
    setTimeout(function(){btn.textContent="✓ Use This Data";btn.style.background="";btn.disabled=false;msg.textContent="";},4000);
  }catch(e){btn.textContent="✓ Use This Data";btn.disabled=false;alert("Save failed: "+e.message);}
}
function copyAll(){
  var lines=[],f=getFinal();
  SECTIONS.forEach(function(s){s.fields.forEach(function(fd){if(f[fd.key])lines.push(fd.label+": "+f[fd.key]);});});
  navigator.clipboard.writeText(lines.join("\n")).then(function(){
    var m=document.getElementById("saveMsg");m.textContent="Copied ✓";
    setTimeout(function(){m.textContent="";},2000);
  });
}
function goBack(){window.location.href="/app";}
function newSession(){
  if(!confirm("Clear this session and start a new customer?"))return;
  sessionStorage.removeItem("smartfill_profile");window.location.href="/app";
}
