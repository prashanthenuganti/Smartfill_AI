<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in — SmartFill AI</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f4f6fa; color:#111827;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .card{
    background:#fff; border:1px solid #e4e7ef;
    border-radius:16px; padding:40px 36px; width:360px; text-align:center;
    box-shadow:0 1px 4px rgba(0,0,0,0.07);
  }
  .brand{ font-size:22px; font-weight:800; margin-bottom:6px; letter-spacing:-0.3px; }
  .brand em{ font-style:normal; color:#2563eb; }
  .sub{ font-size:13px; color:#6b7280; margin-bottom:28px; }
  .g-btn{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:12px; background:#fff; color:#1f1f1f;
    border:1px solid #e4e7ef; border-radius:10px; font-size:14px; font-weight:600;
    text-decoration:none; cursor:pointer; transition:background .15s;
  }
  .g-btn:hover{ background:#eef1f8; }
  .g-icon{ width:18px; height:18px; }
  .foot{ margin-top:20px; font-size:11px; color:#9ca3af; }
  .error{ background:#fef2f2; border:1px solid #fecaca;
    color:#dc2626; font-size:12px; padding:10px 12px; border-radius:8px; margin-bottom:18px; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">SmartFill <em>AI</em></div>
    <div class="sub">Sign in with your Google account to continue.</div>
    <a class="g-btn" href="/auth/login">
      <svg class="g-icon" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.9 6.1 29.7 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.9 6.1 29.7 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.6 0 10.7-2.1 14.5-5.6l-6.7-5.7C29.7 34.5 27 35.5 24 35.5c-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.6 39.6 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.7 5.7C41.8 36.5 44 30.7 44 24c0-1.3-.1-2.6-.4-3.5z"/>
      </svg>
      Sign in with Google
    </a>
    <div class="foot">Only used to track operator activity — no data is shared.</div>
  </div>
</body>
</html>
