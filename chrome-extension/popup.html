<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartFill AI</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">SmartFill <em>AI</em></span>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusLabel">Checking…</span>
    </div>
  </header>

  <!-- Main screens (only one visible at a time) -->

  <!-- Screen 1: No profile loaded -->
  <div class="screen" id="screenEmpty">
    <div class="empty-state">
      <div class="empty-icon">🗂️</div>
      <div class="empty-title">No customer data</div>
      <div class="empty-sub">Upload documents and confirm the profile first.</div>
      <button class="btn-primary full-width" id="openAppBtn">Open SmartFill AI →</button>
    </div>
  </div>

  <!-- Screen 2: Profile ready — main autofill screen -->
  <div class="screen hidden" id="screenReady">
    <!-- Profile summary -->
    <div class="profile-card">
      <div class="profile-header">
        <div>
          <div class="profile-name" id="profileName">—</div>
          <div class="profile-meta" id="profileMeta">—</div>
        </div>
        <button class="btn-ghost btn-sm" id="clearProfileBtn" title="Clear profile">✕</button>
      </div>
      <div class="profile-fields" id="profileFields"></div>
    </div>

    <!-- Page status -->
    <div class="page-status" id="pageStatus">
      <div class="page-status-icon" id="pageStatusIcon">🔍</div>
      <div class="page-status-text" id="pageStatusText">Scanning page for form fields…</div>
    </div>

    <!-- Field mapping preview -->
    <div class="mapping-section hidden" id="mappingSection">
      <div class="section-title">Fields to fill</div>
      <div class="mapping-list" id="mappingList"></div>
    </div>

    <!-- No fields found -->
    <div class="no-fields hidden" id="noFieldsMsg">
      <div class="no-fields-icon">📋</div>
      <div>No form fields found on this page.</div>
      <div class="no-fields-sub">Navigate to an application form and try again.</div>
    </div>

    <!-- Error banner -->
    <div class="error-banner hidden" id="errorBanner"></div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-primary full-width" id="fillBtn" disabled>
        Fill Form
      </button>
      <button class="btn-ghost full-width" id="rescanBtn">
        Rescan Page
      </button>
    </div>

    <!-- Fill result -->
    <div class="fill-result hidden" id="fillResult"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
